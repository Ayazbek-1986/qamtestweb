<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA Тест</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .question {
      margin-bottom: 20px;
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }
    .question h3 {
      margin-bottom: 10px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      cursor: pointer;
    }
    button {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
    #result {
      text-align: center;
      margin-top: 20px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>QA Тест</h1>
    <form id="qaForm">

      <div class="question">
        <h3>1. Какие задачи выполняет QA?</h3>
        <label><input type="radio" name="q1" value="a"> Предотвращение дефектов через процессы</label>
        <label><input type="radio" name="q1" value="b"> Подготовка тестов к выполнению</label>
        <label><input type="radio" name="q1" value="c"> Писать код фикций</label>
        <label><input type="radio" name="q1" value="d"> Упражнение качества программной организации</label>
      </div>

      <div class="question">
        <h3>2. Что определяют Severity и Priority?</h3>
        <label><input type="radio" name="q2" value="a"> Severity показывает насколько критична ошибка</label>
        <label><input type="radio" name="q2" value="b"> Priority показывает, насколько важно исправить баг</label>
        <label><input type="radio" name="q2" value="c"> Высокий Priority всегда означает High Severity</label>
        <label><input type="radio" name="q2" value="d"> Low Severity + High Priority может означать важную бизнес-функцию</label>
      </div>

      <div class="question">
        <h3>3. Какие виды тестирования относятся к Non-Functional?</h3>
        <label><input type="radio" name="q3" value="a"> Performance Testing</label>
        <label><input type="radio" name="q3" value="b"> Security Testing</label>
        <label><input type="radio" name="q3" value="c"> Functional Testing</label>
        <label><input type="radio" name="q3" value="d"> Usability Testing</label>
      </div>

      <!-- Добавляйте остальные вопросы по аналогии -->

      <button type="button" onclick="checkAnswers()">Проверить ответы</button>
    </form>

    <div id="result"></div>
  </div>

  <script>
    function checkAnswers() {
      const form = document.getElementById('qaForm');
      const resultDiv = document.getElementById('result');

      // правильные ответы
      const answers = {
        q1: 'a',
        q2: 'd',
        q3: 'a', // пример, можете изменить
      };

      let score = 0;
      for (let q in answers) {
        const selected = form.elements[q].value;
        if (selected === answers[q]) {
          score++;
        }
      }

      const total = Object.keys(answers).length;
      resultDiv.textContent = `Вы ответили правильно на ${score} из ${total} вопросов.`;
    }
  </script>
</body>
</html>
